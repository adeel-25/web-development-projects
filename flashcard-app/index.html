<!DOCTYPE html>
<html>
<head>
    <title>CS Flashcards App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Computer Science Flashcards</h1>
    <p>Select a section to start studying.</p>

    <div id="sections">
        <button onclick="showSection('dataStructures')">Data Structures</button>
        <button onclick="showSection('operatingSystems')">Operating Systems</button>
        <button onclick="showSection('java')">Intro to Java</button>
    </div>

    <div id="flashcardArea" style="display:none;">
        <button onclick="goBack()">Back to Sections</button>
        <h2 id="sectionTitle"></h2>
        <p id="counter"></p>

        <div id="card" class="card" onclick="flipCard()"></div>

        <button onclick="previousCard()">Previous</button>
        <button onclick="nextCard()">Next</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
